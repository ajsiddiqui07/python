    <script>
       // Write a function that takes a JSON string representing a list of favorite YouTube channels and returns an array of channel names using JSON.parse().

       jsonstr = '[{"name":"CodeWithHarry"},{"name":"Apna College"},{"name":"Thapa Technical"}]'
       function converstr(takestr){
        let strarray = JSON.parse(takestr);
        let newarray=[];
        for(let i of strarray){
            newarray.push(i.name)
        }
        return newarray
        
       }

       let strconvertintoaray =  converstr(jsonstr)
       console.log(strconvertintoaray);
       
    
    </script>
