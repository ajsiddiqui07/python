    <script>
        
           //  Use the splice() method to remove the second playlist from your playlists array and insert a new playlist at that position. Print the resulting array.<br><br><em><strong>Hint:</strong> splice(startIndex, deleteCount, newItem) can both remove and add in one call.</em>
             playlists = [{
          name: "Top Hits 2026",
          creator: "Arbaz",
          numberOfSongs: 25
        },

{
          name: "Workout Mix",
          creator: "Rahul",
          numberOfSongs: 18
        },

{
          name: "Chill Vibes",
          creator: "Ayesha",
          numberOfSongs: 30
        }]

        for (let i of playlists) {
            console.log(i);

        }
        playlists.splice(1,1,{
                name: "Late Night Beats",
                creator: "Zain",
                numberOfSongs: 22
            })
        for (let i of playlists) {
            console.log(i);

        }
