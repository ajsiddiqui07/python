<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    
    <h1>song title</h1>
    <button id="btn">change song</button>
    <span id="song-title"></span>
    <script>
    

        let song = document.querySelector("#song-title");
        let btn = document.querySelector("#btn");
        let count = 0;
        btn.addEventListener("click",()=>{
           const songs = [
                "Lut Gaye",
                "Raataan Lambiyan",
                "Dil Galti Kar Baitha Hai",
                "Tum Hi Aana",
                "Humnava Mere",
                "Meri Aashiqui",
                "Kesariya",
                "Apna Bana Le",
                "Believer",
                "Shape of You"
            ];
            console.log(songs[count]);
            
            song.innerHTML=`<h3>${songs[count]}</h3>`
            count++;
        })
</script>
</body>
</head>
