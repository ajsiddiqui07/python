<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <button onclick="songselect()">add song</button>
    <div id="main"></div>
    <script>
         const songs = [
            "Lut Gaye",
            "Raataan Lambiyan",
            "Dil Galti Kar Baitha Hai",
            "Tum Hi Aana",
            "Humnava Mere"
        ];
        function songselect(){
      

        let rand = Math.floor(Math.random() * songs.length)
        let main = document.querySelector("#main");
        let card = document.createElement("div")
        card.innerText = songs[rand]
        
        main.appendChild(card)


        }
    </script>
</body>
</html>
