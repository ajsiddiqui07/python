<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
   
</head>
<body>
   <button onclick="like()">like</button>
   <h1 id="msg"></h1>
    <script>
        let count=0;
    function like(){
        
        let msg =  document.getElementById("msg")
        msg.innerText = count;

        count++;
        
    }
   </script>
</body>
