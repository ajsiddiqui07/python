//                 Example(Flipkart Shopping Cart):
// When a user clicks the "Add to Cart" button, the event is first triggered on the button itself and then bubbles up to its parent elements(such as the product card or product list).If a parent element also has a click event listener, a single click could both add the product to the cart and open the product details page, unless event bubbling is controlled(for example, by using stopPropagation()).
