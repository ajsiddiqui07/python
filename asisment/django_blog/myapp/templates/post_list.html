{% extends 'blog/base.html' %}

{% block content %}
<h2>Posts</h2>

{% for post in posts %}
<div class="card mb-3">
    <div class="card-body">
        <h4>{{ post.title }}</h4>
        <p>By {{ post.author.username }}</p>
        <a href="/post/{{ post.id }}/">View</a>
    </div>
</div>
{% endfor %}

{% endblock %}
